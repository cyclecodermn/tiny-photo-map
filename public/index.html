<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tiny Photo Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css?v=side-collapse-20260721">
  </head>
  <body>
    <main id="galleryShell" class="gallery-shell" aria-label="Tiny Photo Map gallery">
      <button id="toggleTripPanel" class="panel-toggle panel-toggle-left" type="button" aria-controls="tripPanel" aria-expanded="true" aria-label="Collapse album and thumbnails">
        &larr;
      </button>
      <button id="toggleMapPanel" class="panel-toggle panel-toggle-right" type="button" aria-controls="mapPanel" aria-expanded="true" aria-label="Collapse maps">
        &rarr;
      </button>

      <aside id="tripPanel" class="trip-panel" aria-label="Trip photos">
        <header class="trip-summary">
          <p id="albumSubtitle" class="eyebrow"></p>
          <h1 id="albumTitle">Loading album</h1>
          <div id="albumDescription"></div>
        </header>
        <div id="thumbnailList" class="thumbnail-list" aria-label="Photo thumbnails"></div>
      </aside>

      <section class="photo-panel" aria-label="Selected photo">
        <header class="photo-toolbar">
          <button id="previousPhoto" class="arrow-button" type="button" aria-label="Previous photo">
            &larr;
          </button>
          <div class="caption-block">
            <h2 id="photoCaption">Loading photo</h2>
            <p id="photoDate"></p>
          </div>
          <button id="nextPhoto" class="arrow-button" type="button" aria-label="Next photo">
            &rarr;
          </button>
        </header>
        <figure class="photo-frame">
          <img id="mainPhoto" alt="">
        </figure>
      </section>

      <aside id="mapPanel" class="map-panel" aria-label="Photo map views">
        <section class="map-card" aria-labelledby="regionalMapTitle">
          <header>
            <h2 id="regionalMapTitle">Regional Map</h2>
          </header>
          <div id="regionalMap" class="map-canvas regional-map" role="application" aria-label="Regional photo location map">
            <p class="map-fallback" data-map-fallback="regional" hidden>Map tiles could not load. The gallery and selected photo details remain available.</p>
          </div>
        </section>
        <section class="map-card" aria-labelledby="localMapTitle">
          <header>
            <h2 id="localMapTitle">Local Map</h2>
          </header>
          <div id="localMap" class="map-canvas local-map" role="application" aria-label="Local photo location map">
            <p class="map-fallback" data-map-fallback="local" hidden>Map tiles could not load. The gallery and selected photo details remain available.</p>
          </div>
        </section>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?v=side-collapse-20260721"></script>
  </body>
</html>
